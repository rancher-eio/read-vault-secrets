---
name: Read Vault Secrets
description: "... it reads secrets from Vault?"
inputs:
  address:
    description: "the address of a deployed vault server"
    required: false
    default: http://vault.ts.rancher.kitchen:8200
  secrets:
    description: "the secrets to fetch from the vault server"
    required: false
    default: secret/data/github-actions/test status
  tailscale_authkey:
    description: "Tailscale Auth Key"
    required: true
  headscale_server:
    description: "Headscale login server"
    required: false
    default: https://headscale.rancher.kitchen
  hostname_prefix:
    description: "Hostname prefix for the runner"
    required: false
    default: github-runner
outputs:
  secrets:
    description: "the secrets fetched from the vault server(json formatted)"
    value: ${{ steps.output.outputs.secrets }}
    
runs:
  using: composite
  steps: 
    # - name: Get GitHub OIDC Token
    #   id: oidc
    #   uses: actions/github-script@v7
    #   with:
    #     script: |
    #       const token = await core.getIDToken();
    #       core.setOutput('token', token);
    #       core.setSecret(token);
                 
    - name: Setup Tailscale
      shell: bash
      run: |
        echo "Installing Tailscale..."
        curl -fsSL https://tailscale.com/install.sh | sudo sh

        sudo cp /etc/resolv.conf /etc/resolv.conf.backup
        echo "Original DNS config backed up"
        
        echo "Setting temporary DNS for initial connection..."
        sudo tee /etc/resolv.conf > /dev/null << EOF
        nameserver 10.100.0.10
        nameserver 8.8.8.8
        nameserver 1.1.1.1
        search headscale.svc.cluster.local svc.cluster.local cluster.local
        EOF
        
        echo "Connecting to Tailscale network..."
        sudo tailscale up \
          --login-server=${{ inputs.headscale_server }} \
          --authkey=${{ inputs.tailscale_authkey }} \
          --hostname=${{ inputs.hostname_prefix }}-${{ github.run_id }} \
          --accept-routes \
          --accept-dns 
          
        echo "Tailscale connection status:"
        tailscale status
        echo "Waiting for connection to stabilize..."
        sleep 15
        tailscale status
        
        echo "Verifying connectivity after Tailscale setup..."
        curl -s -I https://api.github.com && echo "GitHub API accessible" || echo "GitHub API issue"

    - name: Test Vault connectivity
      shell: bash
      run: |
        echo "Testing Vault connectivity..."
        curl -k -s "${{ inputs.address }}/v1/sys/health" || echo "Health check completed"
        
    - name: Read Secrets from Vault
      uses: hashicorp/vault-action@v3
      id: vault
      with:
        method: jwt
        url: ${{ inputs.address }}
        path: ${{ github.repository_owner }}
        role: ${{ github.event.repository.name }}
        secrets: ${{ inputs.secrets }}
        exportEnv: false 
        exportToken: false
        
    - name: Configure Outputs
      uses: actions/github-script@v7
      id: output
      with:
        script: |
          core.setOutput("secrets", ${{ toJSON(steps.vault.outputs) }});
          for (const [key, value] of Object.entries(${{ toJSON(steps.vault.outputs) }})) {
            core.setOutput(key, value);
          }
          
    - name: Cleanup Tailscale
      if: always()
      shell: bash
      run: |
        echo "Cleaning up Tailscale connection..."
        sudo tailscale logout || true
        sudo systemctl stop tailscaled || true
